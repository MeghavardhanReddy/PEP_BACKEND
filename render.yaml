services:
  - type: web
    name: cinemind-backend
    runtime: image
    plan: free
    image:
      # TODO: Replace YOUR_GITHUB_USERNAME with your lowercase GitHub username/org
      url: ghcr.io/YOUR_GITHUB_USERNAME/movie-recommendation-backend:latest
    dockerCommand: /bin/sh -c "python manage.py migrate && gunicorn config.wsgi:application --bind 0.0.0.0:${PORT:-8000}"
    healthCheckPath: /admin/login/
    envVars:
      - key: DEBUG
        value: false
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: cinemind-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false

databases:
  - name: cinemind-db
    plan: free
    databaseName: cinemind_db
    user: cinemind
