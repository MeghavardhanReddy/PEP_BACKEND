name: Build and Deploy Backend Image

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "ml-engine/**"
      - "datasets/**"
      - "Dockerfile"
      - "render.yaml"
      - ".github/workflows/deploy-backend-render.yml"
  pull_request:
    paths:
      - "backend/**"
      - "ml-engine/**"
      - "datasets/**"
      - "Dockerfile"
      - "render.yaml"
      - ".github/workflows/deploy-backend-render.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/movie-recommendation-backend

jobs:
  build:
    name: Build backend Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set lowercase image name
        id: image
        shell: bash
        run: echo "name=${REGISTRY}/${IMAGE_NAME,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=long

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Render deploy
        if: github.event_name == 'push' && github.ref_name == github.event.repository.default_branch
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        shell: bash
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "::notice::Skipping Render deploy because RENDER_DEPLOY_HOOK_URL is not configured."
            exit 0
          fi

          curl -fsSL -X POST "$RENDER_DEPLOY_HOOK_URL"
